<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VADER AUDIO COMMAND</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #000;
      --red: #cc1111;
      --red-dim: #5a0a0a;
      --red-mid: #881111;
      --red-glow: rgba(204,17,17,0.35);
      --green: #00ff41;
      --text: #bdbdbd;
      --text-dim: #555;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    html, body {
      background: var(--black);
      color: var(--text);
      font-family: 'Orbitron', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.13) 3px, rgba(0,0,0,0.13) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.75) 100%);
      pointer-events: none;
      z-index: 998;
    }

    .container {
      max-width: 430px;
      margin: 0 auto;
      padding: 16px 16px 32px;
      position: relative;
      z-index: 1;
    }

    /* HEADER */
    .header {
      text-align: center;
      padding: 20px 0 18px;
      border-bottom: 1px solid var(--red-dim);
      margin-bottom: 20px;
    }

    .imperial-crest { width:56px; height:56px; margin:0 auto 12px; display:block; }

    .header-eyebrow {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px; letter-spacing: 6px; color: var(--red-mid); margin-bottom: 5px;
    }

    .header-title {
      font-size: 28px; font-weight: 900; letter-spacing: 6px; color: #fff;
      text-shadow: 0 0 18px var(--red), 0 0 40px rgba(204,17,17,0.4);
    }

    .header-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px; color: var(--text-dim); letter-spacing: 3px; margin-top: 6px;
    }

    /* STATUS BAR */
    .status-bar {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px; color: var(--text-dim);
      display: flex; justify-content: space-between;
      padding: 7px 0; border-bottom: 1px solid #161616;
      margin-bottom: 26px; letter-spacing: 1px;
    }
    .live-dot { color: var(--green); animation: blink 1.6s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* SECTION LABELS */
    .section-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 8px; letter-spacing: 5px; color: var(--red-dim);
      text-transform: uppercase; margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-label::before, .section-label::after {
      content: ''; flex: 1; height: 1px; background: var(--red-dim);
    }

    /* BREATHING */
    .breathing-section { margin-bottom: 28px; }

    .breathing-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .btn-breathe {
      padding: 18px 10px;
      background: transparent;
      font-family: 'Orbitron', sans-serif;
      font-size: 8px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; cursor: pointer; line-height: 1.6;
      transition: all 0.18s;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
      border: none; outline: none;
    }
    .btn-breathe:active { transform: scale(0.96); }

    .btn-initiate {
      color: var(--green);
      box-shadow: inset 0 0 0 1px #004d1a;
      background: rgba(0,255,65,0.03);
    }
    .btn-initiate:hover, .btn-initiate.is-active {
      background: rgba(0,255,65,0.09);
      box-shadow: inset 0 0 0 1px var(--green), 0 0 18px rgba(0,255,65,0.25);
    }

    .btn-terminate {
      color: var(--red);
      box-shadow: inset 0 0 0 1px var(--red-dim);
      background: rgba(204,17,17,0.03);
    }
    .btn-terminate:hover {
      background: rgba(204,17,17,0.09);
      box-shadow: inset 0 0 0 1px var(--red), 0 0 18px var(--red-glow);
    }

    /* Breath waveform */
    .breath-viz {
      display: flex; align-items: center; justify-content: center;
      gap: 4px; height: 38px; margin-top: 14px;
    }
    .bbar { width: 3px; border-radius: 1px; background: var(--red-dim); transition: background 0.3s; }
    .bbar:nth-child(1)  { height:6px;  --d:0s   }
    .bbar:nth-child(2)  { height:12px; --d:.1s  }
    .bbar:nth-child(3)  { height:18px; --d:.2s  }
    .bbar:nth-child(4)  { height:26px; --d:.3s  }
    .bbar:nth-child(5)  { height:32px; --d:.4s  }
    .bbar:nth-child(6)  { height:36px; --d:.5s  }
    .bbar:nth-child(7)  { height:32px; --d:.6s  }
    .bbar:nth-child(8)  { height:26px; --d:.7s  }
    .bbar:nth-child(9)  { height:18px; --d:.8s  }
    .bbar:nth-child(10) { height:12px; --d:.9s  }
    .bbar:nth-child(11) { height:6px;  --d:1.0s }
    .breath-viz.is-active .bbar {
      background: var(--red);
      animation: wavebar 2.5s ease-in-out var(--d) infinite;
    }
    @keyframes wavebar {
      0%,100% { transform:scaleY(0.25); filter:brightness(0.6); }
      50%      { transform:scaleY(1.2);  filter:brightness(1.4) drop-shadow(0 0 4px var(--red)); }
    }

    /* PHRASE BUTTONS */
    .phrases-section { margin-bottom: 28px; }
    .phrases-grid { display: grid; grid-template-columns: 1fr; gap: 5px; }

    .btn-phrase {
      padding: 13px 14px 13px 20px;
      border: none;
      border-left: 2px solid var(--red-dim);
      background: #060606;
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 10.5px; letter-spacing: 1.5px;
      cursor: pointer; text-align: left; text-transform: uppercase;
      position: relative; overflow: hidden; transition: all 0.14s; outline: none;
    }
    .btn-phrase::before {
      content: '▸'; position: absolute; left: 7px;
      color: var(--red-dim); font-size: 9px; transition: color 0.14s;
    }
    .btn-phrase:hover { border-left-color: var(--red); background: #0c0000; color: #fff; }
    .btn-phrase:hover::before { color: var(--red); }
    .btn-phrase:active { transform: scale(0.99); }

    .btn-phrase.is-playing {
      border-left-color: var(--red);
      background: rgba(204,17,17,0.07);
      color: #fff;
      animation: playing-pulse 0.6s ease-in-out infinite alternate;
    }
    .btn-phrase.is-playing::before { color: var(--red); }
    @keyframes playing-pulse {
      from { box-shadow: -3px 0 10px rgba(204,17,17,0.2); }
      to   { box-shadow: -3px 0 24px rgba(204,17,17,0.55); }
    }

    /* BINARY RESPONSE */
    .binary-section { margin-bottom: 16px; }
    .binary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .btn-binary {
      padding: 20px 10px;
      border: none; background: transparent;
      font-family: 'Orbitron', sans-serif;
      font-size: 15px; font-weight: 900; letter-spacing: 4px;
      cursor: pointer; text-transform: uppercase; transition: all 0.18s;
      position: relative; color: var(--red);
      box-shadow: inset 0 0 0 1px var(--red-dim);
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
      outline: none;
    }
    .btn-binary .dia { display:block; font-size:10px; margin-bottom:5px; color:var(--red-dim); letter-spacing:0; }
    .btn-binary:hover {
      background: rgba(204,17,17,0.1);
      box-shadow: inset 0 0 0 1px var(--red), 0 0 22px var(--red-glow);
      color: #fff;
    }
    .btn-binary:hover .dia { color: var(--red); }
    .btn-binary:active { transform: scale(0.94); }
    .btn-binary.is-playing {
      background: rgba(204,17,17,0.1);
      box-shadow: inset 0 0 0 1px var(--red), 0 0 22px var(--red-glow);
      color: #fff;
    }
    .btn-binary.is-playing .dia { color: var(--red); }

    /* FOOTER */
    .footer { text-align:center; padding:18px 0 0; border-top:1px solid #111; }
    .footer-text { font-family:'Share Tech Mono',monospace; font-size:8px; color:#2a2a2a; letter-spacing:3px; }

    /* RIPPLE */
    .ripple {
      position:absolute; border-radius:50%;
      background:rgba(204,17,17,0.25);
      transform:scale(0); animation:ripple-anim 0.55s linear; pointer-events:none;
    }
    @keyframes ripple-anim { to { transform:scale(4); opacity:0; } }

    /* ── EXPANDED MOBILE PLAYER UI ───────────────────────────────── */
    .quick-section,
    .search-section,
    .category-section {
      margin-top: 14px;
      padding: 14px;
      border: 1px solid rgba(130, 20, 20, 0.55);
      background: rgba(10, 10, 10, 0.82);
      box-shadow: inset 0 0 18px rgba(120, 0, 0, 0.12);
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .search-input {
      width: 100%;
      padding: 14px 12px;
      border: 1px solid rgba(120, 20, 20, 0.8);
      background: #080808;
      color: #f0e6d0;
      font: inherit;
      letter-spacing: 0.04em;
      outline: none;
    }

    .search-input:focus {
      border-color: #b31616;
      box-shadow: 0 0 16px rgba(179, 22, 22, 0.35);
    }

    .category-tabs {
      display: flex;
      gap: 7px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 12px;
      -webkit-overflow-scrolling: touch;
    }

    .category-tab {
      flex: 0 0 auto;
      border: 1px solid rgba(120, 20, 20, 0.7);
      background: #080808;
      color: #bcae99;
      padding: 9px 10px;
      font: inherit;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .category-tab.is-active {
      color: #fff2dc;
      border-color: #d01b1b;
      background: rgba(120, 0, 0, 0.38);
      box-shadow: 0 0 12px rgba(180, 0, 0, 0.25);
    }

    .expanded-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .btn-clip {
      position: relative;
      overflow: hidden;
      width: 100%;
      min-height: 48px;
      padding: 12px 10px;
      border: 1px solid rgba(120, 20, 20, 0.7);
      background: linear-gradient(180deg, #151515, #090909);
      color: #f0e6d0;
      font: inherit;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-align: center;
    }

    .btn-clip.is-pinned {
      border-color: rgba(210, 34, 34, 0.95);
      background: linear-gradient(180deg, rgba(80,0,0,0.9), #090909);
      color: #fff4e2;
    }

    .btn-clip.is-playing {
      border-color: #ff3333;
      color: #fff;
      box-shadow: 0 0 18px rgba(255, 0, 0, 0.35);
    }

    .clip-meta {
      display: block;
      margin-top: 4px;
      opacity: 0.55;
      font-size: 0.58rem;
      letter-spacing: 0.08em;
    }

    .empty-results {
      color: #8d8172;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-align: center;
      padding: 16px 8px;
      border: 1px dashed rgba(120, 20, 20, 0.45);
    }

    @media (min-width: 560px) {
      .quick-grid,
      .expanded-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

  </style>
</head>

    // Misc
    { label: 'ELUSIVE', category: 'Misc', src: 'audio/Misc/elusive.mp3' },
    { label: 'FUTILE', category: 'Misc', src: 'audio/Misc/futile.mp3' },
    { label: 'HOW CONVENIENT', category: 'Misc', src: 'audio/Misc/howconvenient.mp3' },
    { label: 'POINTLESS', category: 'Misc', src: 'audio/Misc/pointless!.mp3' },
    { label: 'SO WEAK', category: 'Misc', src: 'audio/Misc/soweak.mp3' },
    { label: 'SUBMIT', category: 'Misc', src: 'audio/Misc/submit!.mp3' },
    { label: 'YOU HAVE GATHERED THE REMNANTS OF THE JEDI TRADITION', category: 'Misc', src: 'audio/Misc/youhavegatheredtheremnantsofthejeditradition.mp3' },
    { label: 'YOU HAVE GROWN STRONGER', category: 'Misc', src: 'audio/Misc/youhavegrownstronger.mp3' },
  ];

  const CATEGORIES = [
    'All',
    'Quick Reactions',
    'Threats / Intimidation',
    'Empire / Authority',
    'Manipulation / Dark Side',
    'Anger / Disappointment',
    'Combat / Action',
    'Misc'
  ];

  const audioCache = new Map();
  let activeCategory = 'All';
  let activeAudio = null;
  let unlocked = false;

  function getAudio(src, urgent = false) {
    if (!audioCache.has(src)) {
      const a = new Audio(src);
      a.preload = urgent ? 'auto' : 'metadata';
      audioCache.set(src, a);
    }
    return audioCache.get(src);
  }

  function warmPinnedAudio() {
    if (unlocked) return;
    unlocked = true;
    CLIPS.filter(c => c.pinned).forEach(c => {
      const a = getAudio(c.src, true);
      try { a.load(); } catch (_) {}
    });
  }

  // Warm the urgent sounds after the first real user interaction.
  document.addEventListener('pointerdown', warmPinnedAudio, { once: true });

  // Pre-create urgent clips immediately.
  CLIPS.filter(c => c.pinned).forEach(c => getAudio(c.src, true));

  function stopActiveClip() {
    if (activeAudio) {
      activeAudio.pause();
      activeAudio.currentTime = 0;
    }
    document.querySelectorAll('.btn-clip').forEach(b => b.classList.remove('is-playing'));
  }

  function playClip(clip, btn) {
    warmPinnedAudio();
    stopActiveClip();

    const audio = getAudio(clip.src, clip.pinned);
    activeAudio = audio;
    audio.currentTime = 0;
    audio.play().catch(err => {
      console.warn('Audio playback failed:', clip.src, err);
    });

    btn.classList.add('is-playing');
    audio.onended = () => btn.classList.remove('is-playing');
  }

  function makeClipButton(clip, includeMeta = true) {
    const btn = document.createElement('button');
    btn.className = 'btn-clip' + (clip.pinned ? ' is-pinned' : '');
    btn.innerHTML = includeMeta
      ? `${clip.label}<span class="clip-meta">${clip.category}</span>`
      : clip.label;
    btn.addEventListener('click', e => {
      addRipple(btn, e);
      playClip(clip, btn);
    });
    return btn;
  }

  function renderQuickGrid() {
    const quickGrid = document.getElementById('quickGrid');
    quickGrid.innerHTML = '';
    CLIPS.filter(c => c.pinned).forEach(clip => {
      quickGrid.appendChild(makeClipButton(clip, false));
    });
  }

  function renderCategoryTabs() {
    const tabs = document.getElementById('categoryTabs');
    tabs.innerHTML = '';
    CATEGORIES.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'category-tab' + (cat === activeCategory ? ' is-active' : '');
      btn.textContent = cat;
      btn.addEventListener('click', () => {
        activeCategory = cat;
        renderCategoryTabs();
        renderClipGrid();
      });
      tabs.appendChild(btn);
    });
  }

  function renderClipGrid() {
    const grid = document.getElementById('clipGrid');
    const q = document.getElementById('clipSearch').value.trim().toLowerCase();
    grid.innerHTML = '';

    let clips = CLIPS.filter(c => !c.pinned);

    if (activeCategory !== 'All') {
      clips = clips.filter(c => c.category === activeCategory);
    }

    if (q) {
      clips = CLIPS.filter(c =>
        c.label.toLowerCase().includes(q) ||
        c.category.toLowerCase().includes(q) ||
        c.src.toLowerCase().includes(q)
      );
    }

    if (!clips.length) {
      const empty = document.createElement('div');
      empty.className = 'empty-results';
      empty.textContent = 'NO MATCHING AUDIO COMMANDS';
      grid.appendChild(empty);
      return;
    }

    clips.forEach(clip => grid.appendChild(makeClipButton(clip, true)));
  }

  document.getElementById('clipSearch').addEventListener('input', renderClipGrid);

  renderQuickGrid();
  renderCategoryTabs();
  renderClipGrid();

  // ── BREATHING ─────────────────────────────────────────────────────
  const breathAudio = document.getElementById('snd-breathing');
  const breathViz   = document.getElementById('breathViz');
  const btnInitiate = document.getElementById('btnInitiate');

  breathAudio.volume = 0.5;
  breathAudio.loop = true;

  let breathActive = false;
  breathAudio.addEventListener('ended', () => {
    if (breathActive) { breathAudio.currentTime = 0; breathAudio.play(); }
  });

  function startBreathing() {
    warmPinnedAudio();
    breathActive = true;
    breathAudio.currentTime = 0;
    breathAudio.play();
    breathViz.classList.add('is-active');
    btnInitiate.classList.add('is-active');
  }

  function stopBreathing() {
    breathActive = false;
    breathAudio.pause();
    breathAudio.currentTime = 0;
    breathViz.classList.remove('is-active');
    btnInitiate.classList.remove('is-active');
  }

  // ── RIPPLE ────────────────────────────────────────────────────────
  function addRipple(el, e) {
    const r    = document.createElement('span');
    const rect = el.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    r.className = 'ripple';
    r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
    el.appendChild(r);
    setTimeout(() => r.remove(), 600);
  }

  document.querySelectorAll('.btn-breathe').forEach(btn => {
    btn.addEventListener('click', e => addRipple(btn, e));
  });
</script>
</body>
</html>
