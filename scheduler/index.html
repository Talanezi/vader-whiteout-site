<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Vader: Whiteout — Scheduler</title>

  <link rel="icon" type="image/png" href="/assets/img/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Crimson+Text:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./app.css" />
</head>
<body>
  <canvas id="wbwCanvas" aria-hidden="true"></canvas>

  <div class="title-banner">
    <div class="eyebrow">INTERNAL PRODUCTION TOOL</div>
    <h1>VADER: WHITEOUT</h1>
    <p class="title-sub">Scheduler</p>
  </div>

  <header class="topnav">
    <nav class="navlinks">
      <a class="btn" id="homeLink" href="/">Home</a>
      <a class="btn" id="membersLink" href="/members/">Members</a>
      <a class="btn btn-primary" href="./index.html">Scheduler</a>
      <button class="btn" id="themeToggle" type="button">Theme</button>
      <button class="btn" id="signOutBtn" type="button" hidden>Sign out</button>
    </nav>
  </header>

  <main class="stage">
    <section class="section" id="authSection"></section>

    <div id="appShell" class="hidden">
      <section class="section topbar-card">
        <div id="topbar"></div>
      </section>

      <div class="workspace">
        <aside class="sidebar">
          <div class="card" id="profileCard"></div>
          <div class="card" id="defaultsCard"></div>

          <details class="card hidden" id="adminWrap">
            <summary>Admin</summary>
            <div id="adminCard" class="admin-inner"></div>
          </details>
        </aside>

        <section class="section board-section">
          <div id="boardTools"></div>
          <div id="calendarWrap"></div>
          <div id="boardActions"></div>
        </section>

        <aside class="summary-col">
          <div class="card" id="rankedCard"></div>
          <div class="card" id="peopleCard"></div>
        </aside>
      </div>
    </div>
  </main>

  <footer class="footer-shell">
    <div>Internal scheduler for Vader: Whiteout production</div>
    <div class="footer-sub">Noindex • Production-only • Shared availability</div>
  </footer>

  <script src="./config.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
